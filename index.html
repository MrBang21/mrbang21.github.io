<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MrBang21 :: Github & Stuff...</title>
<style>
*, *::before, *::after {
	box-sizing: border-box;
	margin: 0;
	padding: 0;
}

:root {
	color-scheme: dark;
	scrollbar-color: oklch(0.6 0.2 220) oklch(0.2 0 0);
	--bg: oklch(0.2 0 0);
	--card-back: oklch(0.25 0 0);
	--card-back-hover: oklch(0.3 0 0);
	--card-front: oklch(0.3 0 0);
	--card-front-hover: oklch(0.35 0 0);
	--border: oklch(0.3 0 0);
	--accent: oklch(0.6 0.2 220);
	--accent-hover: oklch(0.7 0.2 220);
	--text: oklch(0.9 0 0);
	--text-muted: oklch(0.7 0 0);
	--radius: 1em;
	--bounce: cubic-bezier(0.68, -0.55, 0.27, 1.55);
	--snap: cubic-bezier(0.4, 0, 0.2, 1);
}


html,
body,
textarea,
select,
div {
	scrollbar-width: thin;
	scrollbar-gutter: stable;
}
html {
	font-size: clamp(1rem, 1.2vw, 1.125rem);
}

body {
	background: var(--bg);
	color: var(--text);
	font-family: system-ui, sans-serif;
	min-height: 100vh;
	display: flex;
	flex-direction: column;
	font-size: 1em;
	overflow-x: clip;
	overflow-y: scroll;
	>header,
	>main,
	>footer {
		width: 100%;
		max-width: 90em;
		margin: 0 auto;
		padding: 1em .5em;
	}
	>header {
		display: flex;
		align-items: center;
		gap: 1em;
		border-bottom: 1px solid var(--border);
		h1 {
			font-weight: 600;
			color: var(--text);
			span {
				color: var(--accent);
			}
		}
		p {
			color: var(--text-muted);
			font-size: 1em;
		}
	}
	>main {
		flex: 1;
		max-width: 80em;
	}
	>footer {
		border-top: 1px solid var(--border);
		text-align: center;
		font-size: 0.8em;
		color: var(--text-muted);
	}
}
a {
	color: var(--accent);
	text-decoration: none;
	&:hover {
		color: var(--accent-hover);
	}
}
h1, h2, h3 {
	font-weight: 600;
	color: var(--text);
	letter-spacing: 0.25em;
	margin: .5em 0 0.25em;
}
h1 { font-size: 3em; }
h2 { font-size: 2.5em; }
h3 { font-size: 2em; }

ul.cards,
ul.tags {
	list-style: none;
}

ul.cards {
	display: grid;
	position: relative;
	grid-template-columns: repeat(
		auto-fill,
		minmax(
			15em,
			1fr
		)
	);
	align-items: stretch;
	gap: 1em;
	>li {
		aspect-ratio: 63 / 88;
		--width: 100%;
		position: relative;
		z-index: 1;
		&:hover,
		&:focus-within {
			z-index: 10;
		}
		z-index: 1;
		&.wide {
			grid-column: span 2;
			aspect-ratio: 128 / 88;
		}
		&.forced {
			z-index: 10;
			.card {
				transform: rotateY(180deg);
				scale: 1.1;
			}
		}
		>a {
			display: block;
			width: 100%;
			height: 100%;
			position: relative;
			z-index: 1;
			overflow: visible;
			perspective: 800px;
			&:hover {
				z-index: 10000;
			}
			&:hover .card,
			&:focus-within .card {
				transform: rotateY(180deg);
				scale: 1.1;
				box-shadow: 0 .2em 2em -.5em #000;
				z-index: 5;
			}
			>.card {
				z-index: 1;
				transform-style: preserve-3d;
				transform: rotateY(0deg);
				scale: 1;
				transform-origin: center;
				position: absolute;
				inset: 0;
				display: flex;
				flex-direction: column;
				box-shadow: 0 0 0 0 transparent;
				transition:
					transform .5s var(--bounce) .1s,
					scale .7s var(--snap),
					box-shadow .5s ease;
				>.back,
				>.face {
					backface-visibility: hidden;
					position: absolute;
					inset: 0;
					display: flex;
					flex-direction: column;
					align-items: center;
					justify-content: center;
					text-align: center;
					padding: 1em;
					border-radius: var(--radius);
					corner-shape: squircle;
					overflow: clip;
					border: 2px solid var(--border);
					>.name {
						font-weight: 700;
						color: var(--accent);
						text-wrap: pretty;
					}
				}
				>.back {
					background: var(--card-back);
					transform: rotateY(0deg);
					>.name {
						z-index: 1;
					}
					>.glyphs {
						z-index: 0;
					}
				}
				>.face {
					background: var(--card-front);
					transform: rotateY(180deg);
					>.name {
						font-size: 1.25em;
						flex: 1 1 auto;
						display: flex;
						align-items: flex-end;
						justify-content: center;
					}
					>.desc {
						color: var(--text-muted);
						line-height: 1.5;
						flex: 0 0 50%;
						width: 100%;
						text-align: left;
						background: var(--card-back);
						padding: 0.75em;
						border-radius: var(--radius);
						border: 1px solid var(--border);
						corner-shape: squircle;
						overflow: clip auto;
						text-wrap: pretty;
					}
					>.tags {
						flex: 0 0 1.5em;
						width: 100%;
						height: 1.5em;
					}
				}
			}
		}
	}
}
.glyphs {
	position: absolute;
	inset: 0;
	overflow: clip;
	.glyph {
		position: absolute;
		font-size: 20em;
		font-weight: 700;
		color: var(--bg);
		line-height: 0.75;
		inset: auto;
	}
	&.a1 {
		.l1 {
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
		}
	}
	&.a2 {
		.l1 {
			top: -10%;
			left: -10%;
		}
		.l2 {
			bottom: -10%;
			right: -10%;
		}
	}
	&.a3 {
		.l1 {
			top: 10%;
			left: 50%;
			transform: translate(-50%, -50%);
		}
		.l2 { bottom: -10%; left: 0; }
		.l3 { bottom: -10%; right: -10%; }
	}
	&.a4 {
		.l1 {
			top: -10%;
			left: -10%;
		}
		.l2 {
			top: -10%;
			right: -10%;
		}
		.l3 {
			bottom: -10%;
			left: -10%;
		}
		.l4 {
			bottom: -10%;
			right: -10%;
		}
	}
}

ul.tags {
	display: flex;
	flex-wrap: wrap;
	flex-direction: column;
	align-content: flex-start;
	gap: 0;
	li {
		display: inline-block;
		font-size: .75em;
		color: var(--text-muted);
		background: var(--card-back);
		border: 1px solid var(--border);
		border-radius: .5em;
		corner-shape: squircle;
		padding: 0.15em 0.65em;
		width: fit-content;
	}
}
</style>
</head>
<body>
<header>
<div>
	<h1><span>MrBang21</span> / tools</h1>
	<p>

	</p>
</div>
</header>

<template id="card-template">
	<li>
		<a href="" target="_blank" rel="noopener">
			<div class="card">
				<div class="back">
					<h3 class="name"></h3>
					<div class="glyphs"></div>
				</div>
				<div class="face">
					<h3 class="name"></h3>
					<div class="desc"></div>
					<ul class="tags"></ul>
				</div>
			</div>
		</a>
	</li>
</template>

<template id="tag-template">
	<li></li>
</template>

<template id="glyph-template">
	<span class="glyph"></span>
</template>

<template id="data-template">
	<article id="">
		<h2 class="title"></h2>
		<ul class="cards"></ul>
	</article>
</template>

<main>
	<section id="data-links">
	</section>
</main>

<footer>
	<p>&copy;<span id="year"></span> <a href="https://x.com/MrBang21" target="_blank" rel="noopener">@MrBang21</a>. Hosted on GitHub Pages.</p>
</footer>
<script>
"use strict";
document.getElementById('year').textContent = new Date().getFullYear();

const
	cardTemplate = document.getElementById('card-template'),
	tagTemplate = document.getElementById('tag-template'),
	glyphTemplate = document.getElementById('glyph-template'),
	dataTemplate = document.getElementById('data-template'),
	dataLinks = document.getElementById('data-links');

const addCardsToElement = (element, items) => {
	items.forEach(item => {
		const _card = cardTemplate.content.cloneNode(true);
		_card.querySelector('li').classList.add(...(item.class || []));
		_card.querySelector('a').href = item.link || '#';
		_card.querySelectorAll('.name').forEach(el => {
			el.textContent = item.name;
		});
		_card.querySelector('.desc').textContent = item.desc || '';

		const _glyphs = _card.querySelector('.glyphs');
		if (_glyphs && Array.isArray(item.glyphs) && item.glyphs.length) {
			_glyphs.classList.add(`a${item.glyphs.length}`);
			item.glyphs.forEach((glyph, idx) => {
				const
					_glyph = glyphTemplate.content.cloneNode(true),
					_span = _glyph.querySelector('span');
				_span.textContent = glyph;
				_span.classList.add(`l${idx + 1}`);
				_glyphs.append(_glyph);
			});
		}

		const _tags = _card.querySelector('.tags');
		if (_tags && Array.isArray(item.tags) && item.tags.length) {
			item.tags.forEach(tag => {
				const
					_tag = tagTemplate.content.cloneNode(true),
					_li = _tag.querySelector('li');
				_li.textContent = tag;
				_li.classList.add(`${tag.toLowerCase().replace(/\s+/g, '-')}`);
				_tags.append(_tag);
			});
		}

		element.append(_card);
	});
};

document.addEventListener('DOMContentLoaded', () => {
	fetch('data.json')
		.then(response => response.json())
		.then(data => {

			if (!dataLinks || !dataTemplate || !data || typeof data !== 'object') {
				return;
			}

			Object.entries(data).forEach(([key, items]) => {
				if (!Array.isArray(items)) {
					return;
				}

				const
					_section = dataTemplate.content.cloneNode(true),
					_article = _section.querySelector('article'),
					_title = _section.querySelector('.title'),
					_cards = _section.querySelector('.cards');

				if (_article) {
					_article.id = key.replace(/\s+/g, '-').toLowerCase();
				}
				if (_title) {
					_title.textContent = key;
				}
				if (_cards) {
					addCardsToElement(_cards, items);
				}

				dataLinks.append(_section);
			});

		})
		.catch(error => console.error('Error loading data:', error));
});
</script>
</body>
</html>
